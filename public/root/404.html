<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Redirect link</title>
</head>
<body>
	<script type="text/javascript">
		async function fetchShortcutData(url) {
			try {
				const response = await fetch(url);
				return await response.json();
			} catch (error) {
				console.error(`Failed to fetch "${url}"`, error);
				return {}
			}
		}

		let path = location.pathname.slice(1);
		console.log(`Shortcut name: '${path}'`);
		fetchShortcutData('https://15c.me/sc.json').then(json => {
			let url = json[path];
			console.log(`Shortcut URL: '${url}'`);
			if (url) {
				document.write(`Redirecting to ${url}`);
				location.href = url;
			} else {
				if (path) {
					// 404.html
					document.write('<h1>Shortcut does not exist</h1>');
					document.write('Click <a href="/view/">here</a> for a list of valid shortcuts');
				} else {
					// index.html
					location.href = '/view/';
				}
			}
		})
	</script>
</body>
</html>
