<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Redirect link</title>
</head>
<body>
	<div id="output"></div>
	<script type="text/javascript">
		"use strict";

		const doAfterLoadingSCLJ = (onload) => {
			const scriptTag = document.createElement('script');
			scriptTag.src = 'https://cdnjs.cloudflare.com/ajax/libs/sjcl/1.0.8/sjcl.min.js';
			scriptTag.integrity = 'sha512-s0r9TyYSs5CusSDL5s/QEZQZ4DNYLDXx0S+imS+SHR9mw0Yd0Z5KNS9dw7levSp7GpjOZu/bndds3FEDrKd8dg=='
			scriptTag.crossOrigin = 'anonymous';

			scriptTag.onload = onload;
			scriptTag.onreadystatechange = onload;

			document.head.appendChild(scriptTag);
		};

		async function fetchShortcutData(url) {
			try {
				const response = await fetch(url);
				return await response.json();
			} catch (error) {
				console.error(`Failed to fetch "${url}"`, error);
				let output = document.getElementById('output');
				let text = document.createTextNode(`Failed to load "${url}". See console for more infos.`);
				output.appendChild(text);
				return {}
			}
		}

		const redirectTo = (url) => {
			let output = document.getElementById('output');
			let text = document.createTextNode(`Redirecting to ${url}`);
			output.appendChild(text);
 
			location.href = url;
		}

		const decryptAndRedirect = (data) => {
			let originalData = data.slice(7);
			originalData = originalData.replace(/\'/g, '"');

			for (let i = 0; i < 3; i++) {
				const password = prompt('A password is required for this link');
				if (password) {
					try {
						const url = sjcl.decrypt(password, originalData);
						console.log('Decrypted:', url);
						redirectTo(url);
						return;
					} catch (error) {
						console.error('Decrypt failed:', error);
					}
				} else {
					// Exit quietly, user had empty password or pressed cancel
					return;
				}
			}
			alert('Too many wrong attempts!');
		}

		const handleRedirect = (data) => {
			if (data) {
				if (data.startsWith('crypto|')) {
					doAfterLoadingSCLJ(() => decryptAndRedirect(data));
				} else {
					redirectTo(data);
				}
			} else {
				if (path) {
					// 404.html
					let output = document.getElementById('output');
					let div = document.createElement('div');
					div.innerHTML = `<h2>Shortcut does not exist</h2>
									Click <a href="/view/">here</a> for a list of valid shortcuts`;
					output.appendChild(div);
				} else {
					// index.html
					location.href = '/view/';
				}
			}
		}

		let path = location.pathname.slice(1);
		console.log(`Shortcut name: '${path}'`);
		fetchShortcutData('https://15c.me/sc.json').then(json => {
			let data = json[path];
			console.log(`Shortcut data: '${data}'`);

			handleRedirect(data);
		});
	</script>
</body>
</html>
